<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slides AI — Generate presentations with AI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 16px 24px;
    border-bottom: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .brand {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .brand span { color: #d76b2a; }
  .header-actions {
    display: flex;
    gap: 8px;
  }

  /* ── Buttons ── */
  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn-primary {
    background: #d76b2a;
    color: #fff;
  }
  .btn-primary:hover:not(:disabled) { background: #c25e22; }
  .btn-secondary {
    background: #1a1a1a;
    color: #ccc;
    border: 1px solid #333;
  }
  .btn-secondary:hover:not(:disabled) { background: #252525; }
  .btn-present {
    background: #3c5cd5;
    color: #fff;
  }
  .btn-present:hover:not(:disabled) { background: #2e4abf; }

  /* ── Main layout ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Prompt panel ── */
  .prompt-panel {
    width: 380px;
    flex-shrink: 0;
    border-right: 1px solid #1a1a1a;
    display: flex;
    flex-direction: column;
    background: #0d0d0d;
  }
  .prompt-panel h3 {
    padding: 16px 20px 8px;
    font-size: 13px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .prompt-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 20px 16px;
  }
  #prompt {
    flex: 1;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    color: #e0e0e0;
    font-family: inherit;
    font-size: 14px;
    line-height: 1.6;
    padding: 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  #prompt:focus {
    border-color: #d76b2a;
  }
  #prompt::placeholder {
    color: #555;
  }
  .prompt-footer {
    padding: 12px 20px;
    border-top: 1px solid #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .token-est {
    font-size: 11px;
    color: #555;
  }

  /* ── Preview panel ── */
  .preview-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #111;
    overflow: auto;
    padding: 32px;
  }
  .preview-panel.empty-state {
    color: #333;
    font-size: 15px;
    text-align: center;
  }
  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* ── Slide preview ── */
  .slide-container {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
  }
  .slide-container.visible {
    display: flex;
  }
  .slide-viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    position: relative;
  }
  .slide-frame {
    width: 960px;
    height: 540px;
    transform-origin: center center;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  .slide-frame iframe {
    width: 960px;
    height: 540px;
    border: none;
    pointer-events: none;
  }
  .slide-nav {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 0 0;
    flex-shrink: 0;
  }
  .slide-nav button {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #ccc;
    width: 36px;
    height: 36px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
  }
  .slide-nav button:hover { background: #252525; }
  .slide-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
  .slide-counter {
    font-size: 13px;
    color: #666;
    min-width: 60px;
    text-align: center;
  }

  /* ── Loading ── */
  .loading-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,10,10,0.9);
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .loading-overlay.visible {
    display: flex;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #222;
    border-top-color: #d76b2a;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text {
    color: #888;
    font-size: 13px;
  }

  /* ── Present mode ── */
  body.present-mode header,
  body.present-mode .prompt-panel {
    display: none;
  }
  body.present-mode .preview-panel {
    padding: 0;
  }
  body.present-mode .slide-nav { display: none; }
  body.present-mode .slide-frame {
    border-radius: 0;
    box-shadow: none;
  }

  /* ── Settings row ── */
  .settings-row {
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .setting-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .setting-item label {
    font-size: 12px;
    color: #888;
  }
  .setting-item select,
  .setting-item input[type="number"] {
    background: #111;
    border: 1px solid #222;
    border-radius: 4px;
    color: #ccc;
    padding: 4px 8px;
    font-size: 12px;
    outline: none;
    width: 80px;
  }

  /* ── API key input ── */
  .api-key-bar {
    padding: 12px 20px;
    border-bottom: 1px solid #1a1a1a;
  }
  .api-key-bar input {
    width: 100%;
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    color: #ccc;
    padding: 8px 12px;
    font-size: 12px;
    font-family: monospace;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-key-bar input:focus { border-color: #d76b2a; }
  .api-key-bar input::placeholder { color: #444; }
</style>
</head>
<body>

<header>
  <div class="brand">slides<span>.ai</span></div>
  <div class="header-actions">
    <button class="btn btn-present" id="presentBtn" disabled onclick="startPresent()">Apresentar</button>
    <button class="btn btn-secondary" id="exportBtn" disabled onclick="exportPDF()">Exportar PDF</button>
  </div>
</header>

<div class="main">
  <!-- Left: prompt -->
  <div class="prompt-panel">
    <div class="api-key-bar">
      <input type="password" id="apiKey" placeholder="sk-ant-... (sua API key Anthropic)" />
    </div>

    <h3>Prompt</h3>
    <div class="prompt-area">
      <textarea id="prompt" placeholder="Descreva sua apresentação...&#10;&#10;Ex: Uma apresentação de 6 slides sobre a startup Devlup — o que vendemos, pra quem, por que comprariam, como construímos, como vendemos.&#10;&#10;Inclua dados, citações, e um slide de encerramento."></textarea>
    </div>

    <div class="settings-row">
      <div class="setting-item">
        <label>Slides</label>
        <input type="number" id="slideCount" value="6" min="2" max="12" />
      </div>
      <div class="setting-item">
        <label>Estilo</label>
        <select id="style">
          <option value="minimal-dark">Dark Minimal</option>
          <option value="minimal-light">Light Minimal</option>
          <option value="corporate">Corporate</option>
        </select>
      </div>
    </div>

    <div class="prompt-footer">
      <span class="token-est" id="tokenEst">~3-5k tokens por geração</span>
      <button class="btn btn-primary" id="generateBtn" onclick="generate()">Gerar Slides</button>
    </div>
  </div>

  <!-- Right: preview -->
  <div class="preview-panel empty-state" id="previewPanel">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">Gerando slides...</div>
    </div>

    <div id="emptyState">
      <div class="empty-icon">&#9654;</div>
      <p>Escreva um prompt e clique em <strong>Gerar Slides</strong></p>
    </div>

    <div class="slide-container" id="slideContainer">
      <div class="slide-viewport">
        <div class="slide-frame" id="slideFrame"></div>
      </div>
      <div class="slide-nav">
        <button id="prevBtn" onclick="navSlide(-1)">&#8592;</button>
        <span class="slide-counter" id="slideCounter">1 / 1</span>
        <button id="nextBtn" onclick="navSlide(1)">&#8594;</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>

let generatedHTML = '';
let currentSlide = 0;
let totalSlides = 0;
let presenting = false;

// Persist API key
const apiKeyInput = document.getElementById('apiKey');
apiKeyInput.value = localStorage.getItem('slides-ai-key') || '';
apiKeyInput.addEventListener('change', () => {
  localStorage.setItem('slides-ai-key', apiKeyInput.value);
});

function getSystemPrompt(slideCount, style) {
  const themes = {
    'minimal-dark': {
      bg: '#282828', text: '#e0e0e0', accent: '#d76b2a', accent2: '#3c5cd5',
      slideBg: '#1e1e1e', cardBg: '#2a2a2a', muted: '#888'
    },
    'minimal-light': {
      bg: '#fff', text: '#282828', accent: '#d76b2a', accent2: '#3c5cd5',
      slideBg: '#fff', cardBg: '#f5f5f5', muted: '#888'
    },
    'corporate': {
      bg: '#0f172a', text: '#e2e8f0', accent: '#3b82f6', accent2: '#10b981',
      slideBg: '#1e293b', cardBg: '#334155', muted: '#94a3b8'
    }
  };
  const t = themes[style] || themes['minimal-dark'];

  return `You are a presentation designer. Generate a complete, self-contained HTML file with exactly ${slideCount} slides.

REQUIREMENTS:
- Each slide is a <div class="slide"> with exactly 960x540px
- Slide 1 is always a cover/title slide
- Last slide is always a closing/summary slide
- Use clean, professional typography
- Keep text concise — bullet points, not paragraphs
- Include slide numbers

THEME:
- Background: ${t.slideBg}
- Text: ${t.text}
- Accent: ${t.accent}
- Secondary accent: ${t.accent2}
- Muted text: ${t.muted}
- Card/highlight bg: ${t.cardBg}
- Cover & closing background: ${t.bg}

STRUCTURE — Return ONLY the HTML inside <body>, no <html>, <head>, or <style> in a separate block.
Wrap everything in a single <div id="slides-root"> and put a <style> tag INSIDE it as the first child.

The CSS must include:
.slide {
  width: 960px;
  height: 540px;
  padding: 48px 56px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
}

Do NOT include any script tags. Return ONLY the HTML.`;
}

async function generate() {
  const key = apiKeyInput.value.trim();
  if (!key) { apiKeyInput.focus(); apiKeyInput.style.borderColor = '#e53e3e'; return; }
  apiKeyInput.style.borderColor = '#222';

  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  const slideCount = parseInt(document.getElementById('slideCount').value) || 6;
  const style = document.getElementById('style').value;

  const btn = document.getElementById('generateBtn');
  const loading = document.getElementById('loading');
  btn.disabled = true;
  btn.textContent = 'Gerando...';
  loading.classList.add('visible');
  document.getElementById('emptyState').style.display = 'none';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        system: getSystemPrompt(slideCount, style),
        messages: [{ role: 'user', content: prompt }]
      })
    });

    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.error?.message || `API error ${resp.status}`);
    }

    const data = await resp.json();
    generatedHTML = data.content[0].text;

    // Show token usage
    const usage = data.usage;
    if (usage) {
      document.getElementById('tokenEst').textContent =
        `${usage.input_tokens} in + ${usage.output_tokens} out tokens`;
    }

    renderSlides();

  } catch (err) {
    alert('Erro: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Gerar Slides';
    loading.classList.remove('visible');
  }
}

function renderSlides() {
  const container = document.getElementById('slideContainer');
  const frame = document.getElementById('slideFrame');
  const panel = document.getElementById('previewPanel');

  // Create iframe to isolate slide styles
  frame.innerHTML = '';
  const iframe = document.createElement('iframe');
  iframe.style.width = '960px';
  iframe.style.height = '540px';
  iframe.style.border = 'none';
  frame.appendChild(iframe);

  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`<!DOCTYPE html>
<html><head><style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; }
  .slide { display: none; }
  .slide.active { display: flex; }
</style></head><body>${generatedHTML}</body></html>`);
  doc.close();

  const slides = doc.querySelectorAll('.slide');
  totalSlides = slides.length;
  currentSlide = 0;

  if (totalSlides > 0) {
    slides[0].classList.add('active');
    container.classList.add('visible');
    panel.classList.remove('empty-state');
    document.getElementById('presentBtn').disabled = false;
    document.getElementById('exportBtn').disabled = false;
    updateNav();
    fitPreview();
  }
}

function fitPreview() {
  const viewport = document.querySelector('.slide-viewport');
  if (!viewport) return;
  const vw = viewport.clientWidth - 32;
  const vh = viewport.clientHeight - 32;
  const scale = Math.min(vw / 960, vh / 540, 1);
  const frame = document.getElementById('slideFrame');
  frame.style.transform = `scale(${scale})`;
}

function navSlide(dir) {
  const next = currentSlide + dir;
  if (next < 0 || next >= totalSlides) return;
  goToSlide(next);
}

function goToSlide(index) {
  const iframe = document.querySelector('#slideFrame iframe');
  if (!iframe) return;
  const slides = iframe.contentDocument.querySelectorAll('.slide');
  slides[currentSlide].classList.remove('active');
  slides[index].classList.add('active');
  currentSlide = index;
  updateNav();
}

function updateNav() {
  document.getElementById('slideCounter').textContent = `${currentSlide + 1} / ${totalSlides}`;
  document.getElementById('prevBtn').disabled = currentSlide === 0;
  document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
}

// Present mode
function startPresent() {
  presenting = true;
  document.body.classList.add('present-mode');
  const frame = document.getElementById('slideFrame');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / 960, vh / 540);
  frame.style.transform = `scale(${scale})`;
  frame.style.position = 'fixed';
  frame.style.top = '50%';
  frame.style.left = '50%';
  frame.style.marginTop = `${-270 * scale}px`;
  frame.style.marginLeft = `${-480 * scale}px`;
  frame.style.zIndex = '1000';
}

function exitPresent() {
  presenting = false;
  document.body.classList.remove('present-mode');
  const frame = document.getElementById('slideFrame');
  frame.style.position = '';
  frame.style.top = '';
  frame.style.left = '';
  frame.style.marginTop = '';
  frame.style.marginLeft = '';
  frame.style.zIndex = '';
  fitPreview();
}

document.addEventListener('keydown', (e) => {
  if (!totalSlides) return;

  if (e.key === 'ArrowRight' || (presenting && e.key === ' ')) {
    e.preventDefault();
    navSlide(1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    navSlide(-1);
  } else if (e.key === 'Escape' && presenting) {
    exitPresent();
  }
});

window.addEventListener('resize', () => {
  if (presenting) {
    const frame = document.getElementById('slideFrame');
    const scale = Math.min(window.innerWidth / 960, window.innerHeight / 540);
    frame.style.transform = `scale(${scale})`;
    frame.style.marginTop = `${-270 * scale}px`;
    frame.style.marginLeft = `${-480 * scale}px`;
  } else {
    fitPreview();
  }
});

// Export PDF
async function exportPDF() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  btn.textContent = 'Exportando...';

  try {
    const iframe = document.querySelector('#slideFrame iframe');
    const slides = iframe.contentDocument.querySelectorAll('.slide');
    const saved = currentSlide;

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [960, 540] });

    for (let i = 0; i < slides.length; i++) {
      // Show only this slide
      slides.forEach(s => s.classList.remove('active'));
      slides[i].classList.add('active');
      await new Promise(r => setTimeout(r, 100));

      const canvas = await html2canvas(slides[i], {
        scale: 2,
        useCORS: true,
        width: 960,
        height: 540
      });
      const img = canvas.toDataURL('image/png');
      if (i > 0) pdf.addPage([960, 540], 'landscape');
      pdf.addImage(img, 'PNG', 0, 0, 960, 540);
    }

    // Restore
    slides.forEach(s => s.classList.remove('active'));
    slides[saved].classList.add('active');
    currentSlide = saved;

    pdf.save('slides-ai-export.pdf');
  } catch (err) {
    alert('Erro ao exportar: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Exportar PDF';
  }
}

</script>
</body>
</html>
